version: "3.8"

services:
  api-local:
    build: .
    environment:
      PORT: 80
      MONGO_CLUSTER_URL: mongodb://equipe17:AVeryComplexPasswordThatIsNot123@mongo:27017
      MONGO_DATABASE: local
    ports:
      - 8081:80
    command: mvn exec:java -Dpersistence=mongo
    
  api-remote:
    image: ghcr.io/glo2003-h24-eq17/restalo-24:latest
    environment:
      PORT: 80
      
      MONGO_CLUSTER_URL: mongodb://equipe17:AVeryComplexPasswordThatIsNot123@mongo:27017
      MONGO_DATABASE: remote
    ports:
        - 8082:80
    command: mvn exec:java -Dpersistence=mongo
  
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: equipe17
      MONGO_INITDB_ROOT_PASSWORD: AVeryComplexPasswordThatIsNot123
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data: